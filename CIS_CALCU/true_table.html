<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truth Table</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="true_table.css">
</head>

<body>

    <video class="bg-video" autoplay muted loop>
        <source src="night-cycle-to-eterna-pokemon-diamond-and-pearl-pixel-moewalls-com.mp4" type="video/mp4">
    </video>

    <div class="panel">

        <!-- Pokeball Header -->
        <div class="pokedex-header">
            <div class="circle big"></div>
            <div class="circle small blue"></div>
            <div class="circle small yellow"></div>
            <div class="circle small green"></div>
        </div>

        <h1>Truth Table</h1>

        <!-- INPUT -->
        <input id="expression" placeholder="Enter logic (A && B || !C)">

        <!-- OPERATORS -->
        <div class="ops-grid">
            <button onclick="insert(' && ')">AND</button>
            <button onclick="insert(' || ')">OR</button>
            <button onclick="insert('!')">NOT</button>
            <button onclick="insert(' ^ ')">XOR</button>
            <button onclick="insert('(')">(</button>
            <button onclick="insert(')')">)</button>
        </div>

        <!-- VARIABLES -->
        <div class="var-btns">
            <button onclick="insert('p')">p</button>
            <button onclick="insert('q')">q</button>
            <button onclick="insert('r')">r</button>
        </div>

        <!-- ACTION -->
        <div class="action-row">
            <button class="main-btn" onclick="generate()">Scan</button>
            <button onclick="clearAll()">Reset</button>
        </div>

        <!-- TABLE -->
        <div class="table-wrapper">
            <table id="table"></table>
        </div>

    </div>

    <script src="true_table.js"></script>
</body>
</html>
