<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="hexcalcu.css">
    <title>CALCULATOR</title>
</head>
<body>

    <video class="bg-video" autoplay muted loop>
        <source src="night-cycle-to-eterna-pokemon-diamond-and-pearl-pixel-moewalls-com.mp4" type="video/mp4">
    </video>

    <div>
        <h2>HEXADECIMAL CALCULATOR</h2>
    </div>

    <div class="calculator">

        <!-- KEYPAD (LEFT) -->
        <div class="keypad">
            <button>C</button>
            <button>←</button>
            <button>+</button>
            <button>-</button>

            <button>D</button>
            <button>E</button>
            <button>F</button>
            <button>X</button>

            <button>A</button>
            <button>B</button>
            <button>C</button>
            <button>/</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>=</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>0</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>.</button>
        </div>

        <!-- DISPLAY PANEL (RIGHT, VERTICAL) -->
        <div class="display">

            <!-- MAIN DISPLAY -->
            <input type="text" id="mainDisplay" placeholder="0" readonly class="main-display">
            <!-- BASE CONVERSIONS -->
            <div class="base-conversions">
                <div class="field">
                    <input type="text" id="hex" placeholder="HEX" readonly> 
                <div class="field">
                    <input type="text" id="dec" placeholder="DECIMAL" readonly>
                </div>

                <div class="field">
                    <input type="text" id="bin" placeholder="BINARY" readonly>
                </div>
    </div>
<script src="hexcalcu.js"></script>
</body>
</html>
