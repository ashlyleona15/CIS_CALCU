<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hexadecimal Calculator</title>
<link rel="stylesheet" href="index.css">
</head>

<body>

    <video class="bg-video" autoplay muted loop>
        <source src="night-cycle-to-eterna-pokemon-diamond-and-pearl-pixel-moewalls-com.mp4" type="video/mp4">
    </video>

    <h2>HEXADECIMAL CALCULATOR</h2>

    <div class="calculator">

        <!-- DISPLAY -->
        <div class="display">
            <input type="text" id="mainDisplay" class="main-display" readonly>
        </div>

        <!-- KEYPAD -->
        <div class="keypad">

            <button>D</button>
            <button>E</button>
            <button>F</button>
            <button class="op">+</button>

            <button>A</button>
            <button>B</button>
            <button>C</button>
            <button class="op">-</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="back">←</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="clear">C</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="equal">=</button>

            <button class="zero">0</button>

        </div>

        <!-- NAMES AT BOTTOM -->
        <div class="names">
            Ashly E. Leona<br>
            Kenneth Jay C. Esguerra
        </div>

    </div>

    <script src="index.js"></script>

</body>
</html>
